<!DOCTYPE html>
<html lang="en">
    <head>
        <title>
            Display Page
        </title>
    </head>
    
    <body>
        <h2>Registered Users</h2>
        <ul id="list"></ul>
        <script>
            let users=JSON.parse(localStorage.getItem("users")) || [];
            let ul=document.getElementById("list");
            users.forEach(function(u) {
                let li=document.createElement("li");
                li.innerText=u.name+" "+u.email;
                ul.appendChild(li);
            });
        </script>
    </body>
</html>
