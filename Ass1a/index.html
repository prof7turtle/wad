<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Website</title>
        <!--Bootstrap CSS-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="index.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    </head>
    <body>
    
        <div class="d-flex">
            <!--Sidebar content-->
            <div class="sidebar bg-dark text-white p-3">
                
                <h4 class="text-center">Admin</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a href="#" class="nav-link text-white">Home</a></li>
                    <li class="nav-item"><a href="#" class="nav-link text-white">DashBoard</a></li>
                    <li class="nav-item"><a href="#" class="nav-link text-white">Profile</a></li>
                    <li class="nav-item"><a href="#" class="nav-link text-white">Logout</a></li>
                </ul>
            </div>

            <!--Main content-->
            <div class="content p-4 w-100">
                <!-- Navbar -->
                <nav class="navbar navbar-light bg-light">
                    <div class="container-fluid">
                        <button class="btn btn-primary" onclick="toggleSidebar()">☰</button>
                        <span class="navbar-brand mb-0 h1">Admin Dashboard</span>
                    </div>
                </nav>
                <h2 class="text-center">DashBoard</h2>
                <div class="row mt-4">
                    <div class="col-md-3">
                        <div class="card text-white bg-primary mb-3">
                            <div class="card-body">
                                <h5><i class="bi bi-people"></i>Total Students</h5>
                                <h3>500</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-success mb-3">
                            <div class="card-body">
                                <h5>Present Students</h5>
                                <h3>200</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-warning mb-3">
                            <div class="card-body">
                                <h5>ABsent Students</h5>
                                <h3>300</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-danger mb-3">
                            <div class="card-body">
                                <h5>FEES Received</h5>
                                <h3>25000500</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Custom JS -->
        <script src="index.js"></script>
        
    </body>
</html>
